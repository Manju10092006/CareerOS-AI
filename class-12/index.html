<script>
(function installGsapFallback(){
const install=function(){
  if(window.gsap) return;
  const activeTriggers=[];
  const toArray=targets=>typeof targets==="string"?Array.from(document.querySelectorAll(targets)):targets instanceof Element?[targets]:Array.from(targets||[]);
  const transformFromVars=vars=>{
    const parts=[];
    if(vars.y!==undefined) parts.push(`translateY(${vars.y}px)`);
    if(vars.x!==undefined) parts.push(`translateX(${vars.x}px)`);
    if(vars.scale!==undefined) parts.push(`scale(${vars.scale})`);
    return parts.join(" ")||"none";
  };
  const play=(el,fromVars,toVars,index)=>{
    const delay=((toVars.delay||0)+(toVars.stagger||0)*index)*1000;
    const duration=(toVars.duration||.6)*1000;
    const start={opacity:fromVars.opacity,transform:transformFromVars(fromVars),clipPath:fromVars.clipPath};
    const end={opacity:toVars.opacity,transform:transformFromVars(toVars),clipPath:toVars.clipPath};
    Object.entries(start).forEach(([key,value])=>{ if(value!==undefined) el.style[key]=value; });
    setTimeout(()=>{
      const anim=el.animate([start,end],{duration,easing:"cubic-bezier(.22,1,.36,1)",fill:"forwards"});
      anim.onfinish=()=>Object.entries(end).forEach(([key,value])=>{ if(value!==undefined) el.style[key]=value; });
    },delay);
  };
  window.ScrollTrigger={getAll(){return activeTriggers;}};
  window.gsap={
    registerPlugin(){},
    killTweensOf(){},
    utils:{toArray},
    fromTo(targets,fromVars,toVars){
      const els=toArray(targets);
      els.forEach((el,index)=>{
        if(toVars.scrollTrigger&&"IntersectionObserver" in window){
          const observer=new IntersectionObserver(entries=>{
            entries.forEach(entry=>{ if(entry.isIntersecting) play(el,fromVars,toVars,index); });
          },{threshold:.12});
          observer.observe(toVars.scrollTrigger.trigger||el);
          activeTriggers.push({kill(){observer.disconnect();}});
        }else{
          play(el,fromVars,toVars,index);
        }
      });
    }
  };
};
if(document.readyState==="loading") window.addEventListener("DOMContentLoaded",install,{once:true});
else install();
})();
</script>

<style>
:root{
  --ink:#1b1b20;
  --muted:#71727a;
  --soft:#f6f8ff;
  --soft-blue:#edf3ff;
  --line:#e7eaf2;
  --panel:#ffffff;
  --black:#17171a;
  --blue:#2f67c8;
  --blue-soft:#dfe9ff;
  --shadow:0 18px 45px rgba(40,48,70,.06);
}
*{font-family:'Inter',sans-serif;box-sizing:border-box;margin:0;padding:0;}
h1,h2,h3,.display-font{font-family:'Hanken Grotesk','Inter',sans-serif;}
html,body{min-height:100%;background:var(--soft-blue);color:var(--ink);overflow-x:hidden;}
body{width:100%;}
button,input,select{font:inherit;}
button{border:none;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:#f2f4f8;}
::-webkit-scrollbar-thumb{background:#a5a8af;border-radius:99px;}

.app-shell{display:flex;min-height:100vh;background:linear-gradient(132deg,#f8fbff 0%,#eef3ff 48%,#f9fbff 100%);}

/* Onboarding */
.ob-card{background:rgba(255,255,255,.92);border:1px solid rgba(223,228,239,.9);border-radius:24px;box-shadow:var(--shadow);max-width:560px;width:100%;padding:40px;backdrop-filter:blur(18px);}
.ob-opt{border:1px solid #E2E8F0;border-radius:16px;padding:18px 20px;cursor:pointer;transition:all .22s;background:#fff;}
.ob-opt:hover{border-color:#2f67c8;background:#f7faff;transform:translateY(-2px);}
.ob-opt.sel{border-color:#2f67c8;background:#eef4ff;box-shadow:0 0 0 4px rgba(47,103,200,.12);}
.ob-tile{border:1px solid #E2E8F0;border-radius:16px;padding:16px 12px;cursor:pointer;transition:all .22s;background:#fff;text-align:center;}
.ob-tile:hover{border-color:#2f67c8;background:#f7faff;transform:translateY(-2px);}
.ob-tile.sel{border-color:#2f67c8;background:#eef4ff;box-shadow:0 0 0 4px rgba(47,103,200,.1);}
.ob-tile.dim{opacity:.4;pointer-events:none;}

/* Steps progress */
.step-dot{width:10px;height:10px;border-radius:50%;transition:all .3s;}
.step-dot.done{background:#2f67c8;}
.step-dot.active{background:#2f67c8;box-shadow:0 0 0 5px rgba(47,103,200,.18);}
.step-dot.pending{background:#D8DDE7;}

/* Sidebar */
.sidebar{width:300px;min-width:300px;background:rgba(248,250,255,.9);height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid rgba(222,226,236,.95);backdrop-filter:blur(18px);z-index:30;}
.sb-logo{padding:34px 30px 28px;border-bottom:1px solid rgba(226,230,239,.7);}
.brand-row{display:flex;align-items:center;gap:14px;}
.brand-mark{width:42px;height:42px;border-radius:16px;background:#17171a;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 28px rgba(23,23,26,.12);}
.brand-mark svg{width:22px;height:22px;}
.brand-title{font-size:15px;font-weight:800;color:#1e1f25;line-height:1.1;}
.brand-subtitle{font-size:12px;color:#737781;margin-top:4px;}
.sb-nav{padding:28px 20px;flex:1;}
.sb-item{width:100%;display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:20px;cursor:pointer;color:#6e727d;font-size:15px;font-weight:700;transition:transform .22s ease,background .22s ease,color .22s ease,box-shadow .22s ease;margin-bottom:8px;background:transparent;text-align:left;}
.sb-item:hover{background:#fff;color:#1e1f25;transform:translateX(3px);box-shadow:0 10px 28px rgba(45,52,70,.06);}
.sb-item.active{background:#17171a;color:#fff;box-shadow:0 16px 32px rgba(23,23,26,.16);}
.sb-item.active .sb-icon{color:#fff;}
.sb-icon{width:20px;height:20px;flex-shrink:0;color:currentColor;display:flex;}
.sb-section{font-size:10px;font-weight:800;letter-spacing:.12em;color:#a1a5af;padding:0 14px 12px;text-transform:uppercase;}
.profile-chip{margin:0 20px 22px;padding:16px;border-radius:22px;background:#fff;border:1px solid rgba(226,230,239,.9);box-shadow:0 14px 34px rgba(40,48,70,.05);}
.sb-section,.sb-logo > div[style],.sidebar > div[style]{display:none!important;}

/* App chrome */
.main-content{margin-left:300px;min-height:100vh;flex:1;background:linear-gradient(132deg,#fafcff 0%,#eef4ff 58%,#f7f9ff 100%);}
.topbar{height:92px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 40px;border-bottom:1px solid rgba(223,228,239,.85);background:rgba(248,250,255,.8);backdrop-filter:blur(20px);}
.search-pill{height:46px;min-width:320px;display:flex;align-items:center;gap:12px;padding:0 18px;border-radius:999px;background:#fff;border:1px solid rgba(228,232,241,.92);color:#7b7f89;box-shadow:0 10px 24px rgba(45,52,70,.04);}
.search-pill svg{width:18px;height:18px;}
.search-pill input{width:100%;border:0;outline:0;color:#1e1f25;background:transparent;font-size:14px;}
.top-actions{display:flex;align-items:center;gap:14px;}
.verified-pill{height:42px;display:flex;align-items:center;gap:10px;padding:0 18px;border-radius:999px;background:#dfe8ff;color:#3461b6;font-size:14px;font-weight:800;}
.verified-pill svg{width:17px;height:17px;}
.avatar-pill{width:48px;height:48px;border-radius:50%;background:#17171a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;}
.content-inner{padding:38px 44px 86px;max-width:1320px;margin:0 auto;}

/* Dashboard */
.dashboard-page{display:flex;flex-direction:column;gap:34px;}
.dashboard-hero{max-width:760px;}
.eyebrow{font-size:12px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:14px;}
.hero-title{font-size:64px;line-height:1.02;font-weight:400;color:#17171a;margin-bottom:22px;letter-spacing:0;}
.hero-copy{font-size:18px;line-height:1.7;color:#70737d;max-width:760px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:24px;}
.feature-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:24px;}
.feature-card{min-height:224px;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.feature-icon{width:52px;height:52px;border-radius:18px;background:#f2f3f5;display:flex;align-items:center;justify-content:center;color:#1e1f25;margin-bottom:38px;}
.feature-icon svg{width:27px;height:27px;}
.feature-arrow{position:absolute;right:24px;top:24px;width:18px;height:18px;color:#8a8d95;}
.signal-card{grid-column:span 1;min-height:224px;}
.quick-list{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.quick-row{display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;border-radius:16px;background:#f7f8fb;border:1px solid #edf0f6;text-align:left;cursor:pointer;transition:all .2s ease;}
.quick-row:hover{background:#fff;border-color:#ccd8f6;transform:translateY(-2px);}

/* Cards */
.card{background:rgba(255,255,255,.92);border-radius:22px;box-shadow:var(--shadow);border:1px solid rgba(229,232,240,.95);backdrop-filter:blur(18px);}
.stat-card{background:rgba(255,255,255,.92);border-radius:22px;padding:28px 26px;border:1px solid rgba(229,232,240,.95);box-shadow:var(--shadow);min-height:172px;display:flex;flex-direction:column;justify-content:center;transition:transform .22s ease,box-shadow .22s ease;}
.stat-card:hover,.card:hover,.exam-card:hover{transform:translateY(-3px);box-shadow:0 24px 55px rgba(35,42,62,.09);}
.stat-label{font-size:12px;font-weight:900;letter-spacing:.18em;color:#747782;text-transform:uppercase;margin-bottom:20px;}
.stat-value{font-size:52px;line-height:1;font-weight:900;color:#17171a;margin-bottom:12px;}
.stat-value small{font-size:16px;font-weight:800;color:#555963;}
.stat-sub{font-size:14px;color:#70737d;line-height:1.5;}

/* Pill badge */
.badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:999px;font-size:11px;font-weight:700;}

/* Slider */
.sld{-webkit-appearance:none;width:100%;height:7px;border-radius:99px;outline:none;cursor:pointer;background:#E2E8F0;}
.sld::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#2f67c8;cursor:pointer;box-shadow:0 2px 8px rgba(47,103,200,.35);transition:transform .15s;}
.sld::-webkit-slider-thumb:hover{transform:scale(1.16);}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.fade-up{animation:fadeUp .35s ease both;}
.spin{animation:spin 1s linear infinite;}
.pulse{animation:pulse 2s ease infinite;}
.reveal-text{will-change:transform,opacity,clip-path;}
.motion-card{will-change:transform,opacity;}

/* AI Processing */
.ai-ring{width:86px;height:86px;border-radius:50%;border:3px solid #E2E8F0;border-top-color:#2f67c8;animation:spin 1s linear infinite;}

/* Exam card */
.exam-card{background:rgba(255,255,255,.92);border:1px solid rgba(226,230,239,.95);border-radius:22px;padding:22px;cursor:pointer;transition:all .22s ease;box-shadow:0 12px 30px rgba(40,48,70,.04);}
.exam-card.expanded{border-color:#a9bdf0;box-shadow:0 18px 45px rgba(47,103,200,.1);}

/* Test */
.opt-btn{width:100%;text-align:left;padding:14px 18px;border-radius:16px;border:1px solid #E2E8F0;background:#fff;cursor:pointer;transition:all .18s;font-size:14px;}
.opt-btn:hover{border-color:#2f67c8;background:#f5f8ff;}
.opt-btn.selected{border-color:#2f67c8;background:#eef4ff;}
.opt-btn.correct{border-color:#10B981;background:#ECFDF5;color:#065F46;}
.opt-btn.wrong{border-color:#EF4444;background:#FEF2F2;color:#991B1B;}

/* Progress bar */
.prog-bar{height:9px;border-radius:99px;background:#E2E8F0;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width 1s ease;}

/* Roadmap timeline */
.timeline-line{position:absolute;left:19px;top:42px;width:2px;height:calc(100% - 20px);background:linear-gradient(to bottom,#2f67c8,#E2E8F0);}

/* Tab underline */
.tab-btn{padding:11px 16px;font-size:13.5px;font-weight:700;color:#64748B;border-bottom:2px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;background:transparent;}
.tab-btn.active{color:#2f67c8;border-bottom-color:#2f67c8;}
.tab-btn:hover{color:#2f67c8;}

/* Input */
.inp{width:100%;border:1.5px solid #E2E8F0;border-radius:14px;padding:11px 14px;font-size:14px;outline:none;transition:border .18s,box-shadow .18s;background:#fff;}
.inp:focus{border-color:#2f67c8;box-shadow:0 0 0 4px rgba(47,103,200,.1);}

select.inp{background:#fff;}
.btn-primary{background:#17171a;color:#fff;border-radius:999px;padding:12px 24px;font-size:14px;font-weight:800;border:none;cursor:pointer;transition:all .22s ease;}
.btn-primary:hover{background:#2b2c32;box-shadow:0 12px 26px rgba(23,23,26,.18);transform:translateY(-2px);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-outline{background:#fff;color:#17171a;border:1.5px solid #d9dee9;border-radius:999px;padding:11px 23px;font-size:14px;font-weight:800;cursor:pointer;transition:all .18s;}
.btn-outline:hover{background:#f5f8ff;border-color:#b8c6ea;}

@media (max-width:1180px){
  .stat-grid,.feature-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
  .hero-title{font-size:52px;}
}
@media (max-width:820px){
  .app-shell{display:block;}
  .sidebar{position:relative;width:100%;min-width:0;height:auto;border-right:0;border-bottom:1px solid var(--line);}
  .sb-nav{display:flex;overflow-x:auto;gap:8px;padding:12px 16px;}
  .sb-section,.profile-chip{display:none;}
  .sb-item{white-space:nowrap;margin:0;border-radius:999px;}
  .main-content{margin-left:0;}
  .topbar{height:auto;gap:14px;align-items:stretch;flex-direction:column;padding:18px;}
  .search-pill{min-width:0;width:100%;}
  .content-inner{padding:28px 18px 60px;}
  .hero-title{font-size:42px;}
  .stat-grid,.feature-grid{grid-template-columns:1fr;}
}
</style>

/* ===== UTILITY FUNCTIONS ===== */
function getRecommendedExams(profile){
  if(!profile.stream) return EXAMS.slice(0,6);
  let exams=EXAMS.filter(e=>e.streams.includes(profile.stream));
  if(profile.goals&&profile.goals.length>0){
    const catMap={engineering:["Engineering"],medical:["Medical"],law:["Law"],management:["Management"],design:["Design","Architecture"],defence:["Defence"],ca:["Finance"]};
    const cats=profile.goals.flatMap(g=>catMap[g]||[]);
    if(cats.length>0) exams=exams.filter(e=>cats.includes(e.cat));
  }
  return exams.slice(0,8);
}

function getCollegesByExamScore(exam,score,category="general"){
  const examColleges=COLLEGES.filter(c=>c.exam===exam.id||c.exam===exam);
  return examColleges.map(c=>{
    const cut=c.cutoff[category]||c.cutoff.general;
    let status;
    if(exam==="jee_main"||exam.id==="jee_main"){
      status=score>=cut+2?"safe":score>=cut-2?"moderate":score>=cut-6?"reach":null;
    } else {
      status=score>=cut+5?"safe":score>=cut-5?"moderate":score>=cut-15?"reach":null;
    }
    return{...c,status,cutoffForCat:cut};
  }).filter(c=>c.status);
}

function calcReadiness(profile,history){
  let base=50;
  const m=profile.marks||0;
  if(m>=90)base=80; else if(m>=80)base=70; else if(m>=70)base=62; else if(m>=60)base=55;
  if(history.length===0) return base;
  const avg=history.reduce((s,t)=>s+t.percentage,0)/history.length;
  return Math.round(base*0.4+avg*0.6);
}

function estimatePercentile(score,examId){
  const map={jee_main:{300:99.9,270:99,240:97,210:93,180:87,150:77,120:63,90:45,60:25},
             neet:{720:99.9,680:99,650:97,600:93,550:87,500:78,450:65,400:50,350:35}};
  const tbl=map[examId];
  if(!tbl) return Math.round(score/3);
  const scores=Object.keys(tbl).map(Number).sort((a,b)=>b-a);
  for(let s of scores){ if(score>=s) return tbl[s]; }
  return 1;
}

function initCareerMotion(){
  if(!window.gsap) return;
  const gsap=window.gsap;
  if(window.ScrollTrigger) gsap.registerPlugin(window.ScrollTrigger);
  gsap.killTweensOf(".reveal-text,.motion-card,.card,.stat-card,.exam-card");
  gsap.fromTo(".reveal-text",
    {opacity:0,y:24,clipPath:"inset(0 0 100% 0)"},
    {opacity:1,y:0,clipPath:"inset(0 0 0% 0)",duration:.9,ease:"power3.out",stagger:.08}
  );
  gsap.fromTo(".motion-card",
    {opacity:0,y:28,scale:.985},
    {opacity:1,y:0,scale:1,duration:.8,ease:"power3.out",stagger:.08,delay:.12}
  );
  if(window.ScrollTrigger){
    window.ScrollTrigger.getAll().forEach(t=>t.kill());
    gsap.utils.toArray(".card,.exam-card,.stat-card").forEach((el,i)=>{
      gsap.fromTo(el,
        {opacity:.72,y:26},

    });
  }
}

function AIProcessing({profile,onDone}){
  const [step,setStep]=useState(0);
  const steps=["Analysing your stream & board...","Matching entrance exam eligibility...","Scanning 25+ college cut-offs...","Building your personalised roadmap...","Calculating readiness score..."];
  useEffect(()=>{
    const t=setInterval(()=>setStep(s=>{if(s>=steps.length-1){clearInterval(t);setTimeout(onDone,700);return s;}return s+1;}),800);
    return()=>clearInterval(t);
  },[]);
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(132deg,#fafcff 0%,#eef4ff 58%,#f7f9ff 100%)",display:"flex",alignItems:"center",justifyContent:"center"}}>

          <p key={step} className="fade-up" style={{fontSize:14,color:"#64748B"}}>{steps[step]||steps[steps.length-1]}</p>
        </div>
        <div className="prog-bar mt-6" style={{maxWidth:240,margin:"24px auto 0"}}>
          <div className="prog-fill" style={{width:`${((step+1)/steps.length)*100}%`,background:"linear-gradient(90deg,#6366F1,#8B5CF6)"}}/>
        </div>
      </div>
    </div>
  );
}

/* ===== FULL ONBOARDING FLOW ===== */
function Onboarding({onComplete}){
  const [step,setStep]=useState(0);
  const [profile,setProfile]=useState({});
  const TOTAL=7;

  const next=(data,dir)=>{
    if(dir==="back"){setStep(s=>Math.max(0,s-1));return;}
    const updated={...profile,...data};
    setProfile(updated);
    if(step<6) setStep(s=>s+1);
    else onComplete(updated);
  };

  const stepComponents=[
    <Step0Role onNext={next}/>,
    <Step1Board profile={profile} onNext={next}/>,
    <Step2Stream profile={profile} onNext={next}/>,
    <Step3Location profile={profile} onNext={next}/>,
    <Step4Budget profile={profile} onNext={next}/>,
    <Step5Marks profile={profile} onNext={next}/>,
    <Step6Goals profile={profile} onNext={next}/>,
  ];

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(132deg,#fafcff 0%,#eef4ff 58%,#f7f9ff 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px"}}>
      <div style={{marginBottom:24,textAlign:"center"}}>
        <span style={{fontSize:13,fontWeight:700,letterSpacing:".06em",color:"#6366F1",textTransform:"uppercase"}}>CareerOS AI — After 12th</span>
      </div>
      <StepBar current={step} total={TOTAL}/>
      {stepComponents[step]}
      <p style={{marginTop:16,fontSize:12,color:"#94A3B8"}}>Step {step+1} of {TOTAL}</p>
    </div>
  );
}

                    <td style={{padding:"12px"}}>

              </tbody>

      {testHistory.length===0&&(
        <div className="card" style={{padding:32,textAlign:"center"}}>
          <div style={{width:56,height:56,background:"#EEF2FF",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            <div style={{width:28,height:28,color:"#6366F1"}}>{Icon.test}</div>

          <div style={{fontWeight:700,fontSize:16,color:"#0F172A",marginBottom:6}}>No tests taken yet</div>

          <button className="btn-primary" onClick={()=>onNav("tests")}>Start Mock Test</button>
        </div>
      )}
    </div>
  );
}

/* ===== COLLEGE FINDER TAB ===== */
function CollegeFinder({profile}){
  const [exam,setExam]=useState("jee_main");
  const [score,setScore]=useState("");
  const [category,setCategory]=useState("general");
  const [budgetFilter,setBudgetFilter]=useState("all");
  const [typeFilter,setTypeFilter]=useState("all");
  const [searched,setSearched]=useState(false);
  const [wishlist,setWishlist]=useState([]);

  const examObj=EXAMS.find(e=>e.id===exam);
  const streamExams=EXAMS.filter(e=>e.streams.includes(profile.stream||"pcm"));

  const handleSearch=()=>{ if(score) setSearched(true); };

  const rawResults=searched&&score?getCollegesByExamScore(exam,Number(score),category):[];
  const results=rawResults.filter(c=>{
    if(typeFilter!=="all"&&c.type!==typeFilter) return false;
    if(budgetFilter==="all") return true;
    const fees=parseFloat((c.fees||"0").replace(/[^0-9.]/g,""));
    if(budgetFilter==="under1"&&fees>1) return false;
    if(budgetFilter==="1to5"&&(fees<1||fees>5)) return false;
    if(budgetFilter==="above5"&&fees<5) return false;
    return true;
  });

  const statusConfig={safe:{label:"Safe Bet",color:"#10B981",bg:"#ECFDF5"},moderate:{label:"Moderate",color:"#F59E0B",bg:"#FFFBEB"},reach:{label:"Reach",color:"#EF4444",bg:"#FEF2F2"}};

  return(
    <div>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:".08em",color:"#6366F1",textTransform:"uppercase",marginBottom:6}}>College Finder</div>
        <h1 style={{fontSize:26,fontWeight:800,color:"#0F172A",letterSpacing:"-.03em",marginBottom:6}}>Find Your Best-Fit Colleges</h1>
        <p style={{color:"#64748B",fontSize:14}}>Enter your score/percentile to see which colleges you can safely target, with real cut-off data.</p>
      </div>

      {/* Search form */}
      <div className="card" style={{padding:24,marginBottom:24}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:16}}>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Entrance Exam</label>
            <select className="inp" value={exam} onChange={e=>{setExam(e.target.value);setSearched(false);}}>
              {EXAMS.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>
              Your Score / Percentile
              <span style={{fontWeight:400,color:"#94A3B8",marginLeft:4}}>
                ({exam==="jee_main"||exam==="mht_cet"||exam==="kcet"||exam==="wbjee"?"percentile":exam==="neet"||exam==="bitsat"||exam==="clat"||exam==="ailet"||exam==="nata"?"marks out of "+examObj?.pattern?.totalMarks:"rank/score"})
              </span>
            </label>
            <input className="inp" type="number" placeholder="Enter your score..." value={score} onChange={e=>{setScore(e.target.value);setSearched(false);}}/>
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Category</label>
            <select className="inp" value={category} onChange={e=>setCategory(e.target.value)}>
              <option value="general">General</option>
              <option value="obc">OBC-NCL</option>
              <option value="sc">SC</option>
              <option value="st">ST</option>
              <option value="ews">EWS</option>
            </select>
          </div>
        </div>
        <div style={{display:"flex",gap:12,alignItems:"flex-end"}}>
          <div style={{flex:1}}>
            <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>College Type</label>
            <select className="inp" value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
              <option value="all">All Types</option>
              <option value="Govt">Government</option>
              <option value="State Govt">State Government</option>
              <option value="Govt-Aided">Government Aided</option>
              <option value="Deemed">Deemed University</option>
              <option value="Private">Private</option>
            </select>
          </div>
          <div style={{flex:1}}>
            <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Fee Range</label>
            <select className="inp" value={budgetFilter} onChange={e=>setBudgetFilter(e.target.value)}>
              <option value="all">Any Budget</option>
              <option value="under1">Under ₹1L/yr</option>
              <option value="1to5">₹1–5L/yr</option>
              <option value="above5">₹5L+/yr</option>
            </select>
          </div>
          <button className="btn-primary" style={{flexShrink:0,height:40}} onClick={handleSearch} disabled={!score}>Search Colleges</button>
        </div>
      </div>

      {/* Results */}
      {searched&&(
        <div>
          <div style={{display:"flex",gap:12,marginBottom:16}}>
            {Object.entries(statusConfig).map(([k,v])=>{
              const count=results.filter(r=>r.status===k).length;
              return(
                <div key={k} style={{background:v.bg,border:`1px solid ${v.color}33`,borderRadius:10,padding:"10px 16px",flex:1,textAlign:"center"}}>
                  <div style={{fontSize:22,fontWeight:800,color:v.color}}>{count}</div>
                  <div style={{fontSize:12,fontWeight:600,color:v.color}}>{v.label}</div>
                </div>
              );
            })}
            <div style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 16px",flex:1,textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:800,color:"#0F172A"}}>{results.length}</div>
              <div style={{fontSize:12,fontWeight:600,color:"#64748B"}}>Total Matches</div>
            </div>
          </div>

          {results.length===0?(
            <div className="card" style={{padding:32,textAlign:"center"}}>
              <p style={{fontWeight:600,color:"#0F172A",marginBottom:8}}>No colleges found for this score/filter combination.</p>
              <p style={{fontSize:13,color:"#64748B"}}>Try a different exam, score range, or widen the filters above.</p>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {["safe","moderate","reach"].map(status=>{
                const group=results.filter(r=>r.status===status);
                if(!group.length) return null;
                const cfg=statusConfig[status];
                return(
                  <div key={status}>
                    <div style={{fontSize:12,fontWeight:700,color:cfg.color,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:cfg.color}}/>
                      {cfg.label} ({group.length})
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {group.map(c=>(
                        <div key={c.id} className="card" style={{padding:18,display:"flex",alignItems:"center",gap:16}}>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                              <span style={{fontWeight:700,fontSize:15,color:"#0F172A"}}>{c.name}</span>
                              <span className="badge" style={{background:cfg.bg,color:cfg.color}}>{cfg.label}</span>
                              <span className="badge" style={{background:"#F1F5F9",color:"#64748B"}}>{c.type}</span>
                            </div>
                            <div style={{fontSize:12,color:"#64748B",marginBottom:8}}>{c.location} · {c.rank}</div>
                            <div style={{display:"flex",gap:20,fontSize:12}}>
                              <span style={{color:"#374151"}}><strong>Cut-off:</strong> {c.cutoffForCat} ({category.toUpperCase()})</span>
                              <span style={{color:"#374151"}}><strong>Fees:</strong> {c.fees}</span>
                              <span style={{color:"#374151"}}><strong>Placements:</strong> {c.placements}</span>
                            </div>
                          </div>
                          <div style={{display:"flex",gap:2}}>
                            {Array.from({length:c.stars||3}).map((_,i)=>(
                              <div key={i} style={{width:14,height:14,color:"#F59E0B"}}>{Icon.star}</div>
                            ))}
                          </div>
                          <button onClick={()=>setWishlist(w=>w.includes(c.id)?w.filter(x=>x!==c.id):[...w,c.id])}
                            style={{width:34,height:34,borderRadius:"50%",border:"1.5px solid #E2E8F0",background:wishlist.includes(c.id)?"#FEE2E2":"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:wishlist.includes(c.id)?"#EF4444":"#CBD5E1"}}>
                            <div style={{width:16,height:16}}>{Icon.heart}</div>
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {!searched&&(
        <div className="card" style={{padding:32,textAlign:"center"}}>
          <div style={{width:56,height:56,background:"#EEF2FF",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            <div style={{width:28,height:28,color:"#6366F1"}}>{Icon.college}</div>
          </div>
          <div style={{fontWeight:700,fontSize:16,color:"#0F172A",marginBottom:6}}>Enter your score to find colleges</div>
          <p style={{fontSize:13,color:"#64748B"}}>We'll match your score against 2024 cut-offs across 25+ top colleges and show Safe, Moderate & Reach options.</p>
        </div>
      )}
    </div>
  );
}

/* ===== MOCK TESTS TAB ===== */
function MockTests({profile,onTestComplete}){
  const [phase,setPhase]=useState("select"); // select | running | result
  const [cfg,setCfg]=useState({exam:"jee_main",subject:"physics",type:"quick",chapter:"all"});
  const [questions,setQuestions]=useState([]);
  const [current,setCurrent]=useState(0);
  const [answers,setAnswers]=useState({});
  const [reviewed,setReviewed]=useState({});
  const [timer,setTimer]=useState(0);
  const [showSol,setShowSol]=useState(false);
  const [resultData,setResultData]=useState(null);

  const examOpts=EXAMS.filter(e=>e.streams.includes(profile.stream||"pcm"));
  const subjectMap={jee_main:["physics","chemistry","maths"],neet:["physics","chemistry","biology"],clat:["legal","english"]};
  const subjects=subjectMap[cfg.exam]||["physics","chemistry","maths"];
  const qTypeMap={quick:10,chapter:20,full:30};

  const buildQuestions=()=>{
    const pool=QB[cfg.exam]?.[cfg.subject]||QB.jee_main.physics;
    const count=qTypeMap[cfg.type]||10;
    const shuffled=[...pool].sort(()=>Math.random()-.5);
    return shuffled.slice(0,Math.min(count,shuffled.length));
  };

  const startTest=()=>{
    const qs=buildQuestions();
    setQuestions(qs);
    setAnswers({});
    setReviewed({});
    setCurrent(0);
    setTimer(0);
    setShowSol(false);
    setPhase("running");
  };

  useEffect(()=>{
    if(phase!=="running") return;
    const t=setInterval(()=>setTimer(s=>s+1),1000);
    return()=>clearInterval(t);
  },[phase]);

  const fmtTime=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const submitTest=()=>{
    let correct=0,wrong=0,unattempted=0;
    questions.forEach((q,i)=>{
      if(answers[i]===undefined) unattempted++;
      else if(answers[i]===q.ans) correct++;
      else wrong++;
    });
    const score=correct*4-wrong; // JEE style
    const total=questions.length*4;
    const pct=Math.max(0,(score/total)*100);
    const examLabel=EXAMS.find(e=>e.id===cfg.exam)?.name||cfg.exam;
    const rd={name:`${examLabel} — ${cfg.subject.charAt(0).toUpperCase()+cfg.subject.slice(1)}`,exam:cfg.exam,subject:cfg.subject,type:cfg.type,date:new Date().toLocaleDateString("en-IN"),score,total,correct,wrong,unattempted,timeTaken:Math.round(timer/60)||1,percentage:pct};
    setResultData(rd);
    onTestComplete(rd);
    setPhase("result");
  };

  /* SELECT PHASE */
  if(phase==="select") return(
    <div>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:".08em",color:"#6366F1",textTransform:"uppercase",marginBottom:6}}>Mock Tests</div>
        <h1 style={{fontSize:26,fontWeight:800,color:"#0F172A",letterSpacing:"-.03em",marginBottom:6}}>Practice & Improve</h1>
        <p style={{color:"#64748B",fontSize:14}}>Take chapter-wise or full mock tests. Track accuracy per topic to find and fix weak areas.</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
        <div className="card" style={{padding:24}}>
          <div style={{fontWeight:700,fontSize:15,color:"#0F172A",marginBottom:18}}>Configure Your Test</div>
          <div className="flex flex-col gap-4">
            <div>
              <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Exam</label>
              <select className="inp" value={cfg.exam} onChange={e=>setCfg(c=>({...c,exam:e.target.value,subject:subjectMap[e.target.value]?.[0]||"physics"}))}>
                {examOpts.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Subject</label>
              <select className="inp" value={cfg.subject} onChange={e=>setCfg(c=>({...c,subject:e.target.value}))}>
                {subjects.map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:8}}>Test Type</label>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {[{id:"quick",label:"Quick Test",q:10,time:"~15 min"},{id:"chapter",label:"Chapter Test",q:20,time:"~30 min"},{id:"full",label:"Full Mock",q:30,time:"~45 min"}].map(t=>(
                  <button key={t.id} className={`ob-tile ${cfg.type===t.id?"sel":""}`} onClick={()=>setCfg(c=>({...c,type:t.id}))} style={{padding:"12px 8px"}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#0F172A",marginBottom:2}}>{t.label}</div>
                    <div style={{fontSize:11,color:"#94A3B8"}}>{t.q} Qs · {t.time}</div>
                  </button>
                ))}
              </div>
            </div>
            <button className="btn-primary w-full" style={{marginTop:8}} onClick={startTest}>Start Test</button>
          </div>
        </div>

        <div className="flex flex-col gap-4">
          <div className="card" style={{padding:20}}>
            <div style={{fontWeight:700,fontSize:14,color:"#0F172A",marginBottom:12}}>How It Works</div>
            {[["Choose exam & subject","Focus on weak areas by picking specific subjects"],["Answer timed questions","Every question has a timer — just like the real exam"],["Get instant results","See score, accuracy, and chapter-wise breakdown"],["Track your progress","All tests saved. Watch your improvement over time"]].map(([t,d],i)=>(
              <div key={i} style={{display:"flex",gap:12,marginBottom:i<3?12:0}}>
                <div style={{width:22,height:22,background:"#EEF2FF",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,fontWeight:800,color:"#6366F1"}}>{i+1}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:"#0F172A",marginBottom:2}}>{t}</div>
                  <div style={{fontSize:12,color:"#64748B"}}>{d}</div>
                </div>
              </div>
            ))}
          </div>
          <div className="card" style={{padding:20,background:"linear-gradient(135deg,#EEF2FF,#F5F3FF)"}}>
            <div style={{fontWeight:700,fontSize:14,color:"#4338CA",marginBottom:8}}>Available Question Bank</div>
            {[["JEE Main","Physics, Chemistry, Maths","24 questions"],["NEET","Biology, Physics, Chemistry","14 questions"],["CLAT","Legal Reasoning, English","5 questions"]].map(([e,s,q])=>(
              <div key={e} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(99,102,241,.1)",fontSize:13}}>
                <span style={{fontWeight:600,color:"#4338CA"}}>{e}</span>
                <span style={{color:"#6366F1"}}>{q}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  /* RUNNING PHASE */
  if(phase==="running"){
    const q=questions[current];
    const answered=Object.keys(answers).length;
    return(
      <div style={{maxWidth:760,margin:"0 auto"}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#6366F1"}}>Question {current+1} of {questions.length}</div>
            <div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{q.chapter} · {q.diff}</div>
          </div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <div style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:8,padding:"8px 14px",fontFamily:"monospace",fontSize:16,fontWeight:700,color:"#0F172A"}}>{fmtTime(timer)}</div>
            <button className="btn-primary" style={{padding:"8px 18px",fontSize:13}} onClick={submitTest}>Submit Test</button>
          </div>
        </div>
        {/* Progress */}
        <div className="prog-bar" style={{marginBottom:20}}>
          <div className="prog-fill" style={{width:`${(answered/questions.length)*100}%`,background:"#6366F1"}}/>
        </div>
        {/* Question */}
        <div className="card" style={{padding:28,marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:600,color:"#0F172A",lineHeight:1.7,marginBottom:24}}>{q.q}</div>
          <div className="flex flex-col gap-3">
            {q.opts.map((opt,i)=>{
              let cls="opt-btn";
              if(showSol){
                if(i===q.ans) cls+=" correct";
                else if(answers[current]===i) cls+=" wrong";
              } else if(answers[current]===i) cls+=" selected";
              return(
                <button key={i} className={cls} onClick={()=>{if(!showSol)setAnswers(a=>({...a,[current]:i}));}}>
                  <span style={{fontWeight:600,color:"#94A3B8",marginRight:12}}>{String.fromCharCode(65+i)}.</span>{opt}
                </button>
              );
            })}
          </div>
          {showSol&&(
            <div style={{marginTop:16,background:"#ECFDF5",border:"1px solid #6EE7B7",borderRadius:10,padding:"12px 16px"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#065F46",marginBottom:4}}>Solution</div>
              <div style={{fontSize:13,color:"#064E3B"}}>{q.sol}</div>
            </div>
          )}
        </div>
        {/* Nav */}
        <div style={{display:"flex",gap:10,justifyContent:"space-between",alignItems:"center"}}>
          <button className="btn-outline" style={{padding:"9px 18px",fontSize:13}} disabled={current===0} onClick={()=>{setCurrent(c=>c-1);setShowSol(false);}}>Previous</button>
          <div style={{display:"flex",gap:8}}>
            <button style={{fontSize:12,color:"#F59E0B",fontWeight:600,background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8,padding:"8px 14px",cursor:"pointer"}}
              onClick={()=>setReviewed(r=>({...r,[current]:!r[current]}))}>
              {reviewed[current]?"Unmark":"Mark for Review"}
            </button>
            <button style={{fontSize:12,color:"#64748B",fontWeight:600,background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:8,padding:"8px 14px",cursor:"pointer"}} onClick={()=>setShowSol(s=>!s)}>
              {showSol?"Hide":"Show"} Solution
            </button>
          </div>
          {current<questions.length-1?(
            <button className="btn-primary" style={{padding:"9px 18px",fontSize:13}} onClick={()=>{setCurrent(c=>c+1);setShowSol(false);}}>Next</button>
          ):(
            <button className="btn-primary" style={{padding:"9px 18px",fontSize:13,background:"#10B981"}} onClick={submitTest}>Finish Test</button>
          )}
        </div>
        {/* Question palette */}
        <div className="card" style={{padding:16,marginTop:20}}>
          <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:10}}>Question Palette</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {questions.map((_,i)=>{
              const col=i===current?"#6366F1":answers[i]!==undefined?"#10B981":reviewed[i]?"#F59E0B":"#E2E8F0";
              const tcol=i===current||answers[i]!==undefined?"#fff":reviewed[i]?"#92400E":"#64748B";
              return(
                <button key={i} onClick={()=>{setCurrent(i);setShowSol(false);}}
                  style={{width:32,height:32,borderRadius:6,background:col,color:tcol,fontSize:12,fontWeight:700,border:"none",cursor:"pointer"}}>
                  {i+1}
                </button>
              );
            })}
          </div>
          <div style={{display:"flex",gap:12,marginTop:12,fontSize:11,color:"#64748B"}}>
            {[["#6366F1","Current"],["#10B981","Answered"],["#F59E0B","For Review"],["#E2E8F0","Not Visited"]].map(([c,l])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:10,height:10,borderRadius:3,background:c}}/>
                {l}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  /* RESULT PHASE */
  if(phase==="result"&&resultData){
    const{correct,wrong,unattempted,score,total,percentage,timeTaken}=resultData;
    const perc=estimatePercentile(score,cfg.exam);
    return(
      <div style={{maxWidth:760,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:".08em",color:"#6366F1",textTransform:"uppercase",marginBottom:8}}>Test Complete</div>
          <h2 style={{fontSize:28,fontWeight:800,color:"#0F172A",letterSpacing:"-.03em",marginBottom:6}}>{percentage>=60?"Great performance!":percentage>=40?"Keep practising!":"Need more work"}</h2>
          <p style={{color:"#64748B",fontSize:14}}>Your detailed results are below. Review solutions and focus on weak areas.</p>
        </div>
        {/* Score ring */}
        <div className="card" style={{padding:32,textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:56,fontWeight:900,color:percentage>=60?"#10B981":percentage>=40?"#F59E0B":"#EF4444",letterSpacing:"-.04em",marginBottom:4}}>{percentage.toFixed(0)}<span style={{fontSize:24,color:"#94A3B8"}}>%</span></div>
          <div style={{fontSize:14,color:"#64748B",marginBottom:20}}>Score: {score}/{total} · Time: {timeTaken} min</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
            {[{label:"Correct",val:correct,col:"#10B981",bg:"#ECFDF5"},{label:"Wrong",val:wrong,col:"#EF4444",bg:"#FEF2F2"},{label:"Skipped",val:unattempted,col:"#94A3B8",bg:"#F1F5F9"},{label:"Percentile (est.)",val:`~${perc}`,col:"#6366F1",bg:"#EEF2FF"}].map(s=>(
              <div key={s.label} style={{background:s.bg,borderRadius:12,padding:"16px 10px"}}>
                <div style={{fontSize:22,fontWeight:800,color:s.col,marginBottom:4}}>{s.val}</div>
                <div style={{fontSize:11,color:"#94A3B8",fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
        {/* Question review */}
        <div className="card" style={{padding:22,marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:15,color:"#0F172A",marginBottom:16}}>Question-by-Question Review</div>
          <div className="flex flex-col gap-3">
            {questions.map((q,i)=>{
              const ua=answers[i];
              const isCorrect=ua===q.ans;
              const isSkip=ua===undefined;
              const col=isSkip?"#94A3B8":isCorrect?"#10B981":"#EF4444";
              const bg=isSkip?"#F8FAFC":isCorrect?"#ECFDF5":"#FEF2F2";
              return(
                <div key={i} style={{background:bg,border:`1px solid ${col}33`,borderRadius:10,padding:"12px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div style={{fontSize:12,fontWeight:700,color:col}}>Q{i+1} · {isSkip?"Skipped":isCorrect?"Correct":"Wrong"}</div>
                    <div style={{fontSize:11,color:"#94A3B8"}}>{q.chapter}</div>
                  </div>
                  <div style={{fontSize:13,color:"#374151",marginBottom:6,lineHeight:1.5}}>{q.q}</div>
                  <div style={{fontSize:12,color:"#6366F1"}}>Correct: {q.opts[q.ans]}</div>
                  {!isCorrect&&ua!==undefined&&<div style={{fontSize:12,color:"#EF4444"}}>Your answer: {q.opts[ua]}</div>}
                  <div style={{fontSize:12,color:"#64748B",marginTop:4,fontStyle:"italic"}}>{q.sol}</div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{display:"flex",gap:12}}>
          <button className="btn-outline flex-1" onClick={()=>setPhase("select")}>New Test</button>
          <button className="btn-primary flex-1" onClick={()=>setPhase("select")}>Back to Tests</button>
        </div>
      </div>
    );
  }
  return null;
}

/* ===== PROGRESS TRACKER TAB ===== */
function ProgressTracker({testHistory,profile}){
  const [selExam,setSelExam]=useState("all");
  const filtered=selExam==="all"?testHistory:testHistory.filter(t=>t.exam===selExam);
  const avg=filtered.length?filtered.reduce((s,t)=>s+t.percentage,0)/filtered.length:0;
  const best=filtered.length?Math.max(...filtered.map(t=>t.percentage)):0;
  const totalQ=filtered.reduce((s,t)=>s+(t.correct||0)+(t.wrong||0)+(t.unattempted||0),0);
  const totalCorrect=filtered.reduce((s,t)=>s+(t.correct||0),0);
  const accuracy=totalQ?((totalCorrect/totalQ)*100):0;

  /* Simple SVG line chart */
  function LineChart({data}){
    if(!data.length) return null;
    const W=500,H=100,pad=20;
    const vals=data.map(d=>d.percentage);
    const max=Math.max(100,...vals);
    const xs=data.map((_,i)=>pad+(i/(data.length-1||1))*(W-2*pad));
    const ys=vals.map(v=>H-pad-((v/max)*(H-2*pad)));
    const path="M"+xs.map((x,i)=>`${x},${ys[i]}`).join("L");
    const area=`M${xs[0]},${H-pad}L`+xs.map((x,i)=>`${x},${ys[i]}`).join("L")+`L${xs[xs.length-1]},${H-pad}Z`;
    return(
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
        <defs>
          <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#6366F1" stopOpacity=".25"/>
            <stop offset="100%" stopColor="#6366F1" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={area} fill="url(#chartGrad)"/>
        <path d={path} fill="none" stroke="#6366F1" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {xs.map((x,i)=>(
          <g key={i}>
            <circle cx={x} cy={ys[i]} r="4" fill="#6366F1"/>
            <text x={x} y={ys[i]-8} textAnchor="middle" fontSize="9" fill="#6366F1" fontWeight="700">{vals[i].toFixed(0)}%</text>
          </g>
        ))}
      </svg>
    );
  }

  /* Subject bars */
  const subjStats={};
  testHistory.forEach(t=>{
    const s=t.subject||"General";
    if(!subjStats[s]) subjStats[s]={pct:[],correct:0,total:0};
    subjStats[s].pct.push(t.percentage);
    subjStats[s].correct+=t.correct||0;
    subjStats[s].total+=(t.correct||0)+(t.wrong||0)+(t.unattempted||0);
  });
  const subjArr=Object.entries(subjStats).map(([s,d])=>({subject:s,avg:d.pct.reduce((a,b)=>a+b,0)/d.pct.length,count:d.pct.length}));

  return(
    <div>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:".08em",color:"#6366F1",textTransform:"uppercase",marginBottom:6}}>Progress Tracker</div>
        <h1 style={{fontSize:26,fontWeight:800,color:"#0F172A",letterSpacing:"-.03em",marginBottom:6}}>Your Performance Analytics</h1>
        <p style={{color:"#64748B",fontSize:14}}>Track your improvement over time, identify weak areas, and predict your college eligibility.</p>
      </div>

      {testHistory.length===0?(
        <div className="card" style={{padding:48,textAlign:"center"}}>
          <div style={{width:56,height:56,background:"#EEF2FF",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            <div style={{width:28,height:28,color:"#6366F1"}}>{Icon.progress}</div>
          </div>
          <div style={{fontWeight:700,fontSize:16,color:"#0F172A",marginBottom:6}}>No test data yet</div>
          <p style={{fontSize:13,color:"#64748B"}}>Complete at least one mock test to see your performance analytics here.</p>
        </div>
      ):(
        <>
          {/* Filter */}
          <div className="flex gap-3 mb-5 items-center">
            <span style={{fontSize:13,fontWeight:600,color:"#374151"}}>Filter by exam:</span>
            <select className="inp" style={{width:"auto"}} value={selExam} onChange={e=>setSelExam(e.target.value)}>
              <option value="all">All Exams</option>
              {[...new Set(testHistory.map(t=>t.exam))].map(e=><option key={e} value={e}>{EXAMS.find(ex=>ex.id===e)?.name||e}</option>)}
            </select>
          </div>

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
            {[{label:"Tests Taken",val:filtered.length,col:"#6366F1"},{label:"Average Score",val:`${avg.toFixed(1)}%`,col:"#10B981"},{label:"Best Score",val:`${best.toFixed(1)}%`,col:"#F59E0B"},{label:"Accuracy",val:`${accuracy.toFixed(0)}%`,col:"#8B5CF6"}].map(s=>(
              <div key={s.label} className="stat-card">
                <div style={{fontSize:11,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>{s.label}</div>
                <div style={{fontSize:28,fontWeight:800,color:s.col}}>{s.val}</div>
              </div>
            ))}
          </div>

          {/* Score trend */}
          {filtered.length>1&&(
            <div className="card" style={{padding:24,marginBottom:20}}>
              <div style={{fontWeight:700,fontSize:15,color:"#0F172A",marginBottom:16}}>Score Trend</div>
              <LineChart data={filtered}/>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:11,color:"#94A3B8"}}>
                {filtered.map((t,i)=><span key={i}>{t.date}</span>)}
              </div>
            </div>
          )}

          {/* Subject breakdown */}
          {subjArr.length>0&&(
            <div className="card" style={{padding:24,marginBottom:20}}>
              <div style={{fontWeight:700,fontSize:15,color:"#0F172A",marginBottom:16}}>Subject-wise Performance</div>
              <div className="flex flex-col gap-4">
                {subjArr.map(s=>{
                  const col=s.avg>=70?"#10B981":s.avg>=50?"#6366F1":"#EF4444";
                  return(
                    <div key={s.subject}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                        <span style={{fontSize:13,fontWeight:600,color:"#374151"}}>{s.subject}</span>
                        <div style={{display:"flex",gap:10,alignItems:"center"}}>
                          <span style={{fontSize:11,color:"#94A3B8"}}>{s.count} test{s.count>1?"s":""}</span>
                          <span style={{fontSize:13,fontWeight:700,color:col}}>{s.avg.toFixed(0)}%</span>
                        </div>
                      </div>
                      <div className="prog-bar">
                        <div className="prog-fill" style={{width:`${s.avg}%`,background:col}}/>
                      </div>
                    </div>
                  );
                })}
              </div>

/* ===== MAIN APP ===== */
function App(){
  const [phase,setPhase]=useState("onboarding");
  const [profile,setProfile]=useState({});
  const [activeTab,setActiveTab]=useState("home");
  const [testHistory,setTestHistory]=useState([]);

  useEffect(()=>{
    const timer=setTimeout(initCareerMotion,80);
    return()=>clearTimeout(timer);
  },[phase,activeTab,testHistory.length]);

  const handleOnboardComplete=p=>{
    setProfile(p);
    setPhase("processing");
  };

  const handleProcessingDone=()=>{
    setPhase("dashboard");
  };

  const handleTestComplete=result=>{
    setTestHistory(h=>[...h,result]);
  };

  if(phase==="onboarding") return <Onboarding onComplete={handleOnboardComplete}/>;
  if(phase==="processing") return <AIProcessing profile={profile} onDone={handleProcessingDone}/>;

  const tabContent=()=>{
    switch(activeTab){
      case "home": return <HomeTab profile={profile} testHistory={testHistory} onNav={setActiveTab}/>;
      case "exams": return <ExamExplorer profile={profile}/>;
      case "colleges": return <CollegeFinder profile={profile}/>;
      case "tests": return <MockTests profile={profile} onTestComplete={handleTestComplete}/>;
      case "progress": return <ProgressTracker testHistory={testHistory} profile={profile}/>;
      case "study": return <StudyHub profile={profile}/>;
      case "roadmap": return <Roadmap profile={profile}/>;
      default: return <HomeTab profile={profile} testHistory={testHistory} onNav={setActiveTab}/>;
    }
  };

  return(
    <div className="app-shell">
      <Sidebar active={activeTab} onChange={setActiveTab} profile={profile}/>
      <div className="main-content">
        <Topbar profile={profile}/>
        <div className="content-inner">
          {tabContent()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
